[common]
JSDebugPort=5959
JSDebugMode=0
GraphicsAPI=OpenGLES #comment OpenGLES|WebGL
[android]
UseSwappy=true
[desktop]
WindowMode=WindowResizable #comment Window|WindowResizable|FullScreen
ShowDebugConsole=false #comment true|false
RunInBackground=false 
width=1280
height=720
[waterMark]
Enabled=true
BackgroundColor='#888888'
Image=image/splash.png
FitMode=Contain #comment Contain|Cover|Fill|Center
Duration=1000 #ms
PositionX=0.5 #comment Horizontal position percentage (0.0-1.0, 0.5 = 50%)
PositionY=0.3 #comment Vertical position percentage (0.0-1.0, 0.3 = 30% from top)